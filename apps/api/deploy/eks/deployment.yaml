apiVersion: apps/v1
kind: Deployment
metadata:
  name: fishery-api
  labels:
    app: fishery-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fishery-api
  template:
    metadata:
      labels:
        app: fishery-api
    spec:
      containers:
      - name: api
        image: your-account-id.dkr.ecr.us-east-2.amazonaws.com/fishery-api:latest
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: fishery-api-config
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
